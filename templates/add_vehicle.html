<!DOCTYPE html>
<html>
<head>
    <title>Add Vehicle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 500px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }
    </style>

</head>

<body>

<div class="card bg-white">

    <h3 class="text-center mb-4">Add Vehicle</h3>


    <!-- FLASH MESSAGE -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}

                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>

            {% endfor %}
        {% endif %}
    {% endwith %}


    <form method="POST">

        <div class="mb-3">
            <label>Vehicle Number</label>

            <input type="text"
                   name="vehicle_no"
                   class="form-control"
                   required>
        </div>


        <div class="mb-3">

            <label>Owner</label>

            <select name="owner_id"
                    class="form-control"
                    required>

                {% for owner in owners %}

                    <option value="{{ owner[0] }}">
                        {{ owner[1] }}
                    </option>

                {% endfor %}

            </select>

        </div>


        <div class="mb-3">

            <label>Vehicle Type</label>

            <select name="vehicle_type"
                    class="form-control">

                <option>Bike</option>
                <option>Car</option>
                <option>Truck</option>

            </select>

        </div>


        <div class="mb-3">

            <label>Model</label>

            <input type="text"
                   name="model"
                   class="form-control">

        </div>


        <div class="mb-3">

            <label>Registration Date</label>

            <input type="date"
                   name="reg_date"
                   class="form-control"
                   required>

        </div>


        <div class="d-flex justify-content-between">

            <button type="submit"
                    class="btn btn-success">
                Add Vehicle
            </button>


            <a href="{{ url_for('dashboard') }}"
               class="btn btn-danger">
                Cancel
            </a>

        </div>


    </form>

</div>

</body>
</html>
